<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDA 2026 — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ── RESET & BASE ─────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070f;
  --s1:#0d0d1a;
  --s2:#12121f;
  --s3:#18182a;
  --border:rgba(255,255,255,0.06);
  --border2:rgba(255,255,255,0.1);
  --text:#e8e8f2;
  --muted:#5a5a7a;
  --muted2:#3a3a5a;
  --orange:#ff6b00;
  --orange2:#ff8c3a;
  --green:#00e87a;
  --green2:#00c265;
  --blue:#4da6ff;
  --red:#ff4d6d;
  --yellow:#ffd93d;
  --purple:#b06bff;
  --r:14px;
  --nav-h:64px;
}
html{scroll-behavior:smooth;scroll-padding-top:calc(var(--nav-h) + 16px)}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  font-size:14px;
  line-height:1.6;
  min-height:100vh;
  overflow-x:hidden;
}

/* ── NOISE OVERLAY ─────────────────────────────── */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:.5;
}

/* ── NAV ─────────────────────────────────────── */
nav{
  position:fixed;top:0;left:0;right:0;
  height:var(--nav-h);
  background:rgba(7,7,15,0.85);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  z-index:100;
  display:flex;align-items:center;
  padding:0 24px;gap:0;
}
.nav-logo{
  font-family:'Syne',sans-serif;
  font-weight:800;font-size:15px;
  color:#fff;letter-spacing:-.02em;
  margin-right:auto;
  display:flex;align-items:center;gap:10px;
}
.nav-logo-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--orange);
  box-shadow:0 0 12px var(--orange);
  animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.8)}}

.nav-links{display:flex;gap:2px}
.nav-link{
  font-family:'DM Mono',monospace;
  font-size:11px;font-weight:500;
  color:var(--muted);
  text-decoration:none;
  padding:6px 14px;
  border-radius:8px;
  letter-spacing:.05em;
  text-transform:uppercase;
  transition:all .2s;
  border:1px solid transparent;
}
.nav-link:hover{color:var(--text);background:var(--s2)}
.nav-link.active{color:var(--orange);background:rgba(255,107,0,.08);border-color:rgba(255,107,0,.2)}

.nav-status{
  display:flex;align-items:center;gap:8px;
  margin-left:20px;
  padding:6px 14px;
  border-radius:8px;
  background:var(--s2);
  border:1px solid var(--border);
}
.status-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--muted2);
  transition:background .3s;
}
.status-dot.online{background:var(--green);box-shadow:0 0 8px var(--green)}
.status-dot.cache{background:var(--yellow);box-shadow:0 0 8px var(--yellow)}
.status-dot.loading{background:var(--blue);box-shadow:0 0 8px var(--blue);animation:pulse 1s infinite}
.status-dot.error{background:var(--red)}
.status-text{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}

.nav-refresh{
  margin-left:8px;
  background:transparent;
  border:1px solid var(--border);
  color:var(--muted);
  padding:5px 10px;border-radius:7px;
  font-size:11px;cursor:pointer;
  transition:all .2s;
  font-family:'DM Mono',monospace;
}
.nav-refresh:hover{color:var(--green);border-color:rgba(0,232,122,.3)}

/* ── LAYOUT ─────────────────────────────────── */
.page{padding-top:calc(var(--nav-h) + 32px);padding-bottom:80px;max-width:1100px;margin:0 auto;padding-left:24px;padding-right:24px;position:relative;z-index:1}

/* ── SECTIONS ─────────────────────────────── */
.section{margin-bottom:80px;scroll-margin-top:calc(var(--nav-h) + 24px)}
.section-label{
  font-family:'DM Mono',monospace;
  font-size:10px;font-weight:500;
  letter-spacing:.15em;text-transform:uppercase;
  color:var(--muted);
  margin-bottom:6px;
  display:flex;align-items:center;gap:8px;
}
.section-label::before{content:'';display:block;width:16px;height:1px;background:var(--orange)}
.section-title{
  font-family:'Syne',sans-serif;
  font-size:22px;font-weight:700;
  color:#fff;margin-bottom:24px;
  letter-spacing:-.03em;
}

/* ── HERO SCORE ─────────────────────────────── */
.hero-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.hero-grid-bottom{display:grid;grid-template-columns:2fr 1fr;gap:12px}

@media(max-width:700px){
  .hero-grid{grid-template-columns:1fr 1fr}
  .hero-grid-bottom{grid-template-columns:1fr}
  .nav-links{display:none}
}

.card{
  background:var(--s1);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:20px;
  position:relative;overflow:hidden;
  transition:border-color .2s;
}
.card:hover{border-color:var(--border2)}
.card-accent{
  position:absolute;top:0;left:0;right:0;
  height:2px;border-radius:var(--r) var(--r) 0 0;
}
.card-label{
  font-family:'DM Mono',monospace;
  font-size:9px;font-weight:500;
  letter-spacing:.12em;text-transform:uppercase;
  color:var(--muted);margin-bottom:8px;
}
.card-value{
  font-family:'Syne',sans-serif;
  font-size:36px;font-weight:800;
  line-height:1;margin-bottom:4px;
  letter-spacing:-.03em;
}
.card-sub{font-size:11px;color:var(--muted)}

/* NOTA CARD */
.nota-card{
  background:var(--s1);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:24px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;
  position:relative;overflow:hidden;
}
.nota-ring{
  width:100px;height:100px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;
  position:relative;
  margin-bottom:12px;
}
.nota-ring svg{position:absolute;top:0;left:0;transform:rotate(-90deg)}
.nota-num{
  font-family:'Syne',sans-serif;
  font-size:32px;font-weight:800;
  line-height:1;letter-spacing:-.04em;
}
.nota-denom{font-size:13px;color:var(--muted)}
.nota-status{
  font-family:'DM Mono',monospace;
  font-size:10px;font-weight:500;
  letter-spacing:.12em;text-transform:uppercase;
}

/* ── CONVERT RATE HERO ─────────────────────── */
.convert-hero{
  background:var(--s1);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:24px;
  position:relative;overflow:hidden;
}
.convert-hero::after{
  content:'';
  position:absolute;
  right:-40px;bottom:-40px;
  width:180px;height:180px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(255,107,0,.08) 0%, transparent 70%);
  pointer-events:none;
}
.convert-big{
  font-family:'Syne',sans-serif;
  font-size:56px;font-weight:800;
  line-height:1;letter-spacing:-.04em;
  color:var(--orange);
  margin:8px 0 4px;
}
.convert-bar-wrap{
  height:6px;
  background:rgba(255,255,255,0.05);
  border-radius:99px;overflow:hidden;
  margin-top:14px;
}
.convert-bar{
  height:100%;border-radius:99px;
  background:linear-gradient(90deg,var(--orange),var(--orange2));
  transition:width 1s cubic-bezier(.4,0,.2,1);
}

/* ── TIMELINE ─────────────────────────────── */
.timeline-card{
  background:var(--s1);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:24px;
  grid-column:1/-1;
}
.timeline-header{
  display:flex;justify-content:space-between;align-items:flex-end;
  margin-bottom:20px;flex-wrap:wrap;gap:12px;
}
.timeline-title{
  font-family:'Syne',sans-serif;
  font-size:16px;font-weight:700;color:#fff;
}
.timeline-legend{
  display:flex;gap:16px;
}
.legend-item{
  display:flex;align-items:center;gap:6px;
  font-size:11px;color:var(--muted);
}
.legend-dot{width:8px;height:8px;border-radius:2px}

.chart-area{
  position:relative;
  height:160px;
  display:flex;align-items:flex-end;
  gap:3px;
  padding-bottom:28px;
}
.chart-grid{
  position:absolute;top:0;left:0;right:0;
  height:calc(100% - 28px);
  display:flex;flex-direction:column;justify-content:space-between;
  pointer-events:none;
}
.chart-grid-line{
  border-top:1px dashed rgba(255,255,255,0.04);
  width:100%;position:relative;
}
.chart-grid-line span{
  position:absolute;right:calc(100% + 8px);
  top:-7px;
  font-family:'DM Mono',monospace;
  font-size:9px;color:var(--muted2);
  white-space:nowrap;
}

.bar-group{
  flex:1;display:flex;flex-direction:column;
  align-items:center;gap:2px;
  position:relative;
}
.bar-wrap{
  width:100%;display:flex;
  align-items:flex-end;justify-content:center;
  flex:1;gap:2px;
  position:relative;
}
.bar{
  flex:1;border-radius:3px 3px 0 0;
  transition:height .8s cubic-bezier(.4,0,.2,1),opacity .2s;
  cursor:pointer;position:relative;
  max-width:22px;
}
.bar:hover{filter:brightness(1.3)}
.bar-tooltip{
  position:absolute;
  bottom:calc(100% + 6px);
  left:50%;transform:translateX(-50%);
  background:var(--s3);
  border:1px solid var(--border2);
  border-radius:6px;
  padding:5px 10px;
  font-family:'DM Mono',monospace;
  font-size:10px;color:var(--text);
  white-space:nowrap;
  pointer-events:none;
  opacity:0;transition:opacity .15s;
  z-index:10;
}
.bar:hover .bar-tooltip{opacity:1}
.bar-label{
  font-family:'DM Mono',monospace;
  font-size:9px;color:var(--muted2);
  text-align:center;
  position:absolute;bottom:0;
  white-space:nowrap;
}

.timeline-stats{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:10px;margin-top:16px;
}
@media(max-width:600px){.timeline-stats{grid-template-columns:repeat(2,1fr)}}

.tstat{
  background:var(--s2);
  border:1px solid var(--border);
  border-radius:10px;
  padding:12px 14px;
}
.tstat-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.tstat-value{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;line-height:1}

/* ── TENDÊNCIA ─────────────────────────────── */
.trend-pill{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 12px;border-radius:99px;
  font-family:'DM Mono',monospace;
  font-size:10px;font-weight:500;
  text-transform:uppercase;letter-spacing:.06em;
}

/* ── DEVICES ─────────────────────────────── */
.devices-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:650px){.devices-grid{grid-template-columns:1fr}}

.device-card{
  background:var(--s1);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:20px;
  position:relative;overflow:hidden;
}
.device-icon{font-size:28px;margin-bottom:12px}
.device-name{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;margin-bottom:4px}
.device-pct{
  font-family:'Syne',sans-serif;
  font-size:32px;font-weight:800;
  line-height:1;letter-spacing:-.04em;
  margin:8px 0;
}
.device-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 0;
  border-top:1px solid var(--border);
  font-size:12px;
}
.device-row-label{color:var(--muted)}
.device-row-val{font-family:'DM Mono',monospace;font-weight:500}
.device-bar{
  height:3px;background:rgba(255,255,255,.04);
  border-radius:99px;overflow:hidden;margin:12px 0 8px;
}
.device-bar-fill{height:100%;border-radius:99px;transition:width 1s}

/* ── UX ISSUES ─────────────────────────────── */
.ux-grid{display:flex;flex-direction:column;gap:10px}
.ux-card{
  background:var(--s1);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:20px 24px;
  display:grid;
  grid-template-columns:auto 1fr auto;
  gap:16px;align-items:start;
}
.ux-num{
  font-family:'Syne',sans-serif;
  font-size:28px;font-weight:800;
  line-height:1;color:var(--muted2);
  min-width:30px;
}
.ux-area{font-weight:600;font-size:14px;color:#fff;margin-bottom:4px}
.ux-problem{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:10px}
.ux-fix{
  background:rgba(0,232,122,.05);
  border:1px solid rgba(0,232,122,.1);
  border-radius:8px;
  padding:10px 14px;
  font-size:12px;color:var(--green);
  line-height:1.5;
}
.ux-fix::before{content:'→ ';font-weight:700}
.impact-badge{
  font-family:'DM Mono',monospace;
  font-size:9px;font-weight:500;
  padding:3px 10px;border-radius:99px;
  text-transform:uppercase;letter-spacing:.08em;
  white-space:nowrap;
  align-self:flex-start;
}

/* ── CRO ACTIONS ─────────────────────────────── */
.cro-grid{display:flex;flex-direction:column;gap:10px}
.cro-card{
  background:var(--s1);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:20px 24px;
  display:flex;gap:16px;align-items:flex-start;
  transition:border-color .2s;
}
.cro-card:hover{border-color:var(--border2)}
.cro-priority{
  font-family:'Syne',sans-serif;
  font-size:32px;font-weight:800;
  line-height:1;
  min-width:40px;
  letter-spacing:-.04em;
}
.cro-action{font-weight:600;font-size:14px;color:#fff;margin-bottom:6px}
.cro-impact{
  display:inline-block;
  font-family:'DM Mono',monospace;
  font-size:10px;
  padding:2px 10px;border-radius:99px;
  background:rgba(0,232,122,.08);
  border:1px solid rgba(0,232,122,.15);
  color:var(--green);
  margin-top:2px;
}

/* ── VARIANTES AB ─────────────────────────────── */
.ab-card{
  background:var(--s1);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:20px 24px;
}
.ab-row{
  display:flex;align-items:center;gap:14px;
  padding:10px 0;
  border-bottom:1px solid var(--border);
}
.ab-row:last-child{border-bottom:none}
.ab-label{
  font-family:'Syne',sans-serif;
  font-weight:700;font-size:18px;
  min-width:32px;
}
.ab-bar-outer{flex:1;height:8px;background:rgba(255,255,255,.04);border-radius:99px;overflow:hidden}
.ab-bar-inner{height:100%;border-radius:99px;transition:width 1s cubic-bezier(.4,0,.2,1)}
.ab-leads{
  font-family:'DM Mono',monospace;
  font-size:12px;font-weight:500;
  min-width:40px;text-align:right;
}
.ab-pct{
  font-family:'DM Mono',monospace;
  font-size:11px;color:var(--muted);
  min-width:44px;text-align:right;
}

/* ── ALERTA ─────────────────────────────── */
.alert-box{
  background:rgba(255,77,109,.06);
  border:1px solid rgba(255,77,109,.2);
  border-radius:var(--r);
  padding:16px 20px;
  display:flex;gap:12px;
  align-items:flex-start;
  margin-bottom:24px;
}
.alert-icon{font-size:18px}
.alert-text{font-size:13px;color:#ffb3c1;line-height:1.5}

/* ── RESUMO BOX ─────────────────────────────── */
.resumo-box{
  background:var(--s1);
  border:1px solid var(--border);
  border-left:3px solid var(--orange);
  border-radius:var(--r);
  padding:16px 20px;
  font-size:13px;color:#b0b0c8;
  line-height:1.6;
  margin-bottom:24px;
}

/* ── FOOTER ─────────────────────────────── */
footer{
  text-align:center;
  padding:32px 24px;
  border-top:1px solid var(--border);
  font-family:'DM Mono',monospace;
  font-size:10px;
  color:var(--muted2);
  letter-spacing:.1em;
  text-transform:uppercase;
}

/* ── LOADING SKELETON ─────────────────────── */
.skeleton{
  background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);
  background-size:200% 100%;
  animation:shimmer 1.5s infinite;
  border-radius:6px;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── SCROLL REVEAL ─────────────────────────── */
.reveal{opacity:0;transform:translateY(16px);transition:opacity .5s,transform .5s}
.reveal.visible{opacity:1;transform:translateY(0)}

/* ── PROGRESS BAR TOP ─────────────────────── */
.refresh-bar{
  position:fixed;top:var(--nav-h);left:0;right:0;
  height:2px;z-index:99;
  background:rgba(255,255,255,.04);
}
.refresh-bar-fill{
  height:100%;
  background:linear-gradient(90deg,var(--orange),var(--orange2));
  transform-origin:left;
  transition:transform .1s linear;
}

/* ── MSG ─────────────────────────────────── */
#msg-bar{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  z-index:200;
  padding:10px 20px;
  border-radius:10px;
  font-size:12px;font-family:'DM Mono',monospace;
  backdrop-filter:blur(12px);
  opacity:0;transition:opacity .3s;
  pointer-events:none;white-space:nowrap;
}
#msg-bar.show{opacity:1}

</style>
</head>
<body>

<!-- NAV FIXA -->
<nav>
  <div class="nav-logo">
    <div class="nav-logo-dot"></div>
    SDA <span style="color:var(--orange)">2026</span>
  </div>
  <div class="nav-links">
    <a class="nav-link active" href="#overview">Visão Geral</a>
    <a class="nav-link" href="#dispositivos">Dispositivos</a>
    <a class="nav-link" href="#ux">UX</a>
    <a class="nav-link" href="#cro">CRO</a>
  </div>
  <div class="nav-status">
    <div class="status-dot loading" id="status-dot"></div>
    <span class="status-text" id="status-text">carregando</span>
  </div>
  <button class="nav-refresh" onclick="fetchData()" id="btn-refresh">↻</button>
</nav>

<!-- PROGRESS BAR -->
<div class="refresh-bar">
  <div class="refresh-bar-fill" id="progress-fill" style="transform:scaleX(1)"></div>
</div>

<!-- MENSAGEM TOAST -->
<div id="msg-bar"></div>

<!-- PÁGINA -->
<div class="page">

  <!-- ─── OVERVIEW ─────────────────────────── -->
  <section class="section reveal" id="overview">
    <div class="section-label">01 — Performance Geral</div>
    <div class="section-title">Visão Geral</div>

    <div id="alert-container"></div>
    <div id="resumo-container"></div>

    <!-- MÉTRICAS HERO -->
    <div class="hero-grid" id="hero-metrics">
      <!-- injetado via JS -->
    </div>

    <!-- CONVERT RATE + NOTA -->
    <div class="hero-grid-bottom" id="hero-bottom">
      <!-- injetado via JS -->
    </div>

    <!-- TIMELINE -->
    <div style="margin-top:12px" id="timeline-container">
      <!-- injetado via JS -->
    </div>

  </section>

  <!-- ─── DISPOSITIVOS ─────────────────────────── -->
  <section class="section reveal" id="dispositivos">
    <div class="section-label">02 — Breakdown por Plataforma</div>
    <div class="section-title">Dispositivos</div>
    <div class="devices-grid" id="devices-content">
      <!-- injetado via JS -->
    </div>
  </section>

  <!-- ─── UX ─────────────────────────────────── -->
  <section class="section reveal" id="ux">
    <div class="section-label">03 — Diagnóstico da Interface</div>
    <div class="section-title">Análise UX</div>
    <div class="ux-grid" id="ux-content">
      <!-- injetado via JS -->
    </div>
  </section>

  <!-- ─── CRO ─────────────────────────────────── -->
  <section class="section reveal" id="cro">
    <div class="section-label">04 — Plano de Otimização</div>
    <div class="section-title">Ações CRO</div>
    <div id="ab-container" style="margin-bottom:16px"></div>
    <div class="cro-grid" id="cro-content">
      <!-- injetado via JS -->
    </div>
  </section>

</div>

<footer>SDA Ao Vivo 2026 · Dashboard Automático · <span id="footer-update">—</span></footer>

<script>
/* ─── CONFIG ─────────────────────────────────── */

/* ─── STATUS ─────────────────────────────────── */
function setStatus(s) {
  var dot = document.getElementById('status-dot');
  var txt = document.getElementById('status-text');
  dot.className = 'status-dot ' + s;
  var labels = {online:'ao vivo', cache:'cache', loading:'carregando', error:'offline'};
  txt.textContent = labels[s] || s;
}

/* ─── TOAST ─────────────────────────────────── */
function toast(msg, color) {
  var el = document.getElementById('msg-bar');
  el.textContent = msg;
  el.style.background = color === 'red' ? 'rgba(255,77,109,.15)' : color === 'yellow' ? 'rgba(255,217,61,.12)' : 'rgba(0,232,122,.12)';
  el.style.border = '1px solid ' + (color === 'red' ? 'rgba(255,77,109,.3)' : color === 'yellow' ? 'rgba(255,217,61,.25)' : 'rgba(0,232,122,.25)');
  el.style.color = color === 'red' ? '#ff8fa3' : color === 'yellow' ? '#ffe066' : '#4df5a0';
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 3500);
}

/* ─── TIMER ─────────────────────────────────── */
function tick() {
  var remaining = Math.max(0, targetTime - Date.now());
  var fill = document.getElementById('progress-fill');
  fill.style.transform = 'scaleX(' + (remaining / REFRESH_MS) + ')';
  if (remaining === 0) { targetTime = Date.now() + REFRESH_MS; fetchData(); }
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

/* ─── CACHE ─────────────────────────────────── */
function saveCache(data) {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify({data: data, at: new Date().toISOString()})); } catch(e) {}
}
function loadCache() {
  try { var c = localStorage.getItem(CACHE_KEY); return c ? JSON.parse(c) : null; } catch(e) { return null; }
}

/* ─── FETCH ─────────────────────────────────── */
function fetchData() {
  setStatus('loading');
  var btn = document.getElementById('btn-refresh');
  btn.textContent = '...'; btn.disabled = true;

  fetch(WEB_APP, {redirect: 'follow'})
    .then(function(r) { return r.text(); })
    .then(function(text) {
      var clean = text.trim();
      var s = clean.indexOf('{'), e = clean.lastIndexOf('}');
      if (s >= 0 && e > s) clean = clean.substring(s, e + 1);
      D = JSON.parse(clean);
      setStatus('online');
      saveCache(D);
      targetTime = Date.now() + REFRESH_MS;
      var now = new Date().toLocaleString('pt-BR');
      document.getElementById('footer-update').textContent = 'Atualizado ' + now;
      render(D);
      toast('✓ Dados atualizados', 'green');
    })
    .catch(function() {
      var c = loadCache();
      if (c && c.data) {
        D = c.data;
        setStatus('cache');
        document.getElementById('footer-update').textContent = 'Cache: ' + new Date(c.at).toLocaleString('pt-BR');
        render(D);
        toast('📦 Exibindo cache', 'yellow');
      } else {
        D = MOCK;
        setStatus('cache');
        document.getElementById('footer-update').textContent = 'Dados demonstrativos';
        render(D);
        toast('⚠ Usando dados demo', 'yellow');
      }
    })
    .finally(function() { btn.textContent = '↻'; btn.disabled = false; });
}

/* ─── HELPERS ─────────────────────────────── */
function n(v) { return typeof v === 'number' ? v.toLocaleString('pt-BR') : (v || '—'); }
function pct(v) { return (parseFloat(v) || 0); }

function impactColor(level) {
  return level === 'alto' ? '#ff4d6d' : level === 'médio' ? '#ffd93d' : '#00e87a';
}
function impactBg(level) {
  return level === 'alto' ? 'rgba(255,77,109,.1)' : level === 'médio' ? 'rgba(255,217,61,.1)' : 'rgba(0,232,122,.1)';
}

          tendIcon + ' ' + (d.tendencia || '') +
        '</span>' +

        '<span style="font-size:10px;font-family:DM Mono,monospace;color:var(--muted)">0%</span>' +
        '<span style="font-size:10px;font-family:DM Mono,monospace;color:var(--muted)">Média mercado: ~2%</span>' +
        '<span style="font-size:10px;font-family:DM Mono,monospace;color:var(--muted)">10%</span>' +
      '</div>' +
      '<div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border);display:flex;gap:16px">' +

/* ─── TIMELINE ─────────────────────────────── */
function renderTimeline(d) {
  var container = document.getElementById('timeline-container');

  // Merge sessões e leads por dia
  var sessoesDia = d.sessoes_por_dia || {};
  var leadsDia = d.leads_por_dia || {};

  var allKeys = Object.keys(Object.assign({}, sessoesDia, leadsDia)).sort();
  if (!allKeys.length) { container.innerHTML = ''; return; }

  var maxSessoes = Math.max.apply(null, allKeys.map(function(k) { return sessoesDia[k] || 0; })) || 1;
  var maxLeads = Math.max.apply(null, allKeys.map(function(k) { return leadsDia[k] || 0; })) || 1;
  var maxVal = Math.max(maxSessoes, 1);

  // Grid lines
  var gridLines = [maxVal, Math.round(maxVal * .75), Math.round(maxVal * .5), Math.round(maxVal * .25)];
  var gridHTML = gridLines.map(function(v) {
    return '<div class="chart-grid-line"><span>' + n(v) + '</span></div>';
  }).join('');

  // Bars
  var barsHTML = allKeys.map(function(k) {
    var s = sessoesDia[k] || 0;
    var l = leadsDia[k] || 0;
    var hS = Math.max((s / maxVal) * 110, 4);
    var hL = Math.max((l / maxVal) * 110, 2);
    var label = k.substring(8, 10) + '/' + k.substring(5, 7);
    var convDia = s > 0 ? ((l / s) * 100).toFixed(1) + '%' : '—';
    return '<div class="bar-group">' +
      '<div class="bar-wrap">' +
        '<div class="bar" style="height:' + hS + 'px;background:rgba(77,166,255,0.35)">' +
          '<div class="bar-tooltip">Sessões: ' + n(s) + '</div>' +
        '</div>' +
        '<div class="bar" style="height:' + hL + 'px;background:var(--orange)">' +
          '<div class="bar-tooltip">Leads: ' + n(l) + ' · Conv: ' + convDia + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="bar-label">' + label + '</div>' +
    '</div>';
  }).join('');

  // Stats abaixo do chart
  var totalSessoes = allKeys.reduce(function(acc, k) { return acc + (sessoesDia[k] || 0); }, 0);
  var totalLeads = allKeys.reduce(function(acc, k) { return acc + (leadsDia[k] || 0); }, 0);
  var melhorDia = allKeys.reduce(function(best, k) { return (leadsDia[k] || 0) > (leadsDia[best] || 0) ? k : best; }, allKeys[0]);
  var convGeral = totalSessoes > 0 ? ((totalLeads / totalSessoes) * 100).toFixed(2) + '%' : '—';
  var melhorLabel = melhorDia ? melhorDia.substring(8, 10) + '/' + melhorDia.substring(5, 7) : '—';

  container.innerHTML =
    '<div class="timeline-card">' +
      '<div class="timeline-header">' +
        '<div class="timeline-title">Acessos & Leads — Últimos 7 Dias</div>' +
        '<div class="timeline-legend">' +
          '<div class="legend-item"><div class="legend-dot" style="background:rgba(77,166,255,0.5)"></div>Sessões</div>' +
          '<div class="legend-item"><div class="legend-dot" style="background:var(--orange)"></div>Leads</div>' +
        '</div>' +
      '</div>' +
      '<div class="chart-area">' +
        '<div class="chart-grid">' + gridHTML + '</div>' +
        barsHTML +
      '</div>' +
      '<div class="timeline-stats">' +
        '<div class="tstat"><div class="tstat-label">Total Sessões</div><div class="tstat-value" style="color:var(--blue)">' + n(totalSessoes) + '</div></div>' +
        '<div class="tstat"><div class="tstat-label">Total Leads</div><div class="tstat-value" style="color:var(--orange)">' + n(totalLeads) + '</div></div>' +
        '<div class="tstat"><div class="tstat-label">Conv. Período</div><div class="tstat-value" style="color:var(--green)">' + convGeral + '</div></div>' +
        '<div class="tstat"><div class="tstat-label">Melhor Dia</div><div class="tstat-value" style="color:var(--yellow)">' + melhorLabel + '</div></div>' +
      '</div>' +
    '</div>';
}

/* ─── DEVICES ─────────────────────────────── */
function renderDevices(d) {
  var devColors = {Mobile:'#00e87a', Desktop:'#4da6ff', Tablet:'#ffd93d'};
  var devIcons = {Mobile:'📱', Desktop:'🖥️', Tablet:'📟'};
  var el = document.getElementById('devices-content');
  el.innerHTML = (d.dispositivos || []).map(function(dv) {
    var cor = devColors[dv.tipo] || '#888';
    var p = parseFloat(dv.pct) || 0;
    return '<div class="device-card" style="border-top:3px solid ' + cor + '">' +
      '<div class="device-icon">' + (devIcons[dv.tipo] || '📟') + '</div>' +
      '<div class="device-name" style="color:' + cor + '">' + dv.tipo + '</div>' +
      '<div class="device-pct" style="color:' + cor + '">' + dv.pct + '</div>' +
      '<div style="font-size:11px;color:var(--muted);margin-bottom:8px">do tráfego total</div>' +
      '<div class="device-bar"><div class="device-bar-fill" style="width:' + p + '%;background:' + cor + '"></div></div>' +
      '<div class="device-row"><span class="device-row-label">Sessões</span><span class="device-row-val" style="color:' + cor + '">' + n(dv.sessoes) + '</span></div>' +
      '<div class="device-row"><span class="device-row-label">Visitantes</span><span class="device-row-val">' + n(dv.visitantes) + '</span></div>' +
      '<div class="device-row"><span class="device-row-label">Convert Rate</span><span class="device-row-val" style="color:var(--green)">' + (dv.convert_rate || '—') + '</span></div>' +
    '</div>';
  }).join('');
}

/* ─── UX ─────────────────────────────── */
function renderUX(d) {
  var el = document.getElementById('ux-content');
  el.innerHTML = (d.diagnostico_ux || []).map(function(ux, i) {
    var cor = impactColor(ux.impacto);
    var bg = impactBg(ux.impacto);
    return '<div class="ux-card" style="border-left:3px solid ' + cor + '">' +
      '<div class="ux-num" style="color:' + cor + '40">' + String(i+1).padStart(2,'0') + '</div>' +
      '<div>' +
        '<div class="ux-area">' + ux.area + '</div>' +
        '<div class="ux-problem">' + ux.problema + '</div>' +
        '<div class="ux-fix">' + ux.sugestao + '</div>' +
      '</div>' +
      '<div class="impact-badge" style="background:' + bg + ';color:' + cor + ';border:1px solid ' + cor + '30">' + ux.impacto + '</div>' +
    '</div>';
  }).join('');
}

/* ─── CRO ─────────────────────────────── */
function renderCRO(d) {
  // Variantes AB
  var abEl = document.getElementById('ab-container');
  if (d.variantes && d.variantes.length) {
    var maxLeads = Math.max.apply(null, d.variantes.map(function(v) { return v.leads; }));
    var colors = ['#ff6b00','#4da6ff','#b06bff','#00e87a'];
    abEl.innerHTML =
      '<div class="ab-card" style="margin-bottom:16px">' +
        '<div style="font-family:Syne,sans-serif;font-weight:700;font-size:15px;color:#fff;margin-bottom:16px">Variantes A/B</div>' +
        d.variantes.map(function(v, i) {
          var w = maxLeads > 0 ? (v.leads / maxLeads) * 100 : 0;
          var c = colors[i % colors.length];
          return '<div class="ab-row">' +
            '<div class="ab-label" style="color:' + c + '">' + v.variante + '</div>' +
            '<div class="ab-bar-outer"><div class="ab-bar-inner" style="width:' + w + '%;background:' + c + '"></div></div>' +
            '<div class="ab-leads" style="color:' + c + '">' + n(v.leads) + '</div>' +
            '<div class="ab-pct">' + v.pct + '</div>' +
          '</div>';
        }).join('') +
      '</div>';
  } else { abEl.innerHTML = ''; }

  // Ações CRO
  var croEl = document.getElementById('cro-content');
  var colors2 = ['#ff4d6d','#ff8c3a','#ffd93d','#00e87a','#4da6ff','#b06bff'];
  croEl.innerHTML = (d.acoes_cro || []).map(function(a, i) {
    var c = colors2[i % colors2.length];
    return '<div class="cro-card">' +
      '<div class="cro-priority" style="color:' + c + '">' + (i+1) + '</div>' +
      '<div>' +
        '<div class="cro-action">' + a.acao + '</div>' +
        '<div class="cro-impact">' + (a.impacto_esperado || '') + '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

/* ─── NAV ACTIVE SCROLL ─────────────────────── */
function initNavSpy() {
  var sections = ['overview','dispositivos','ux','cro'];
  var links = document.querySelectorAll('.nav-link');
  function spy() {
    var scrollY = window.scrollY + 100;
    var current = sections[0];
    sections.forEach(function(id) {
      var el = document.getElementById(id);
      if (el && el.offsetTop <= scrollY) current = id;
    });
    links.forEach(function(l) {
      var href = l.getAttribute('href').replace('#','');
      l.classList.toggle('active', href === current);
    });
  }
  window.addEventListener('scroll', spy, {passive:true});
  spy();
}

/* ─── SCROLL REVEAL ─────────────────────────── */
function initScrollReveal() {
  var els = document.querySelectorAll('.reveal');
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
    });
  }, {threshold:0.08});
  els.forEach(function(el) { obs.observe(el); });
}

/* ─── INIT ─────────────────────────────────── */
(function() {
  var c = loadCache();
  if (c && c.data) {
    D = c.data;
    setStatus('cache');
    document.getElementById('footer-update').textContent = 'Cache: ' + new Date(c.at).toLocaleString('pt-BR');
    render(D);
  } else {
    // Renderiza mock imediatamente para não ficar em branco
    D = MOCK;
    render(D);
  }
  fetchData();
})();
</script>
