<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Analítico — SDA Ao Vivo 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            'sda-bg': 'hsl(224, 71%, 4%)',
            'sda-surface': 'hsl(215, 28%, 17%)',
            'sda-brand': 'hsl(24, 100%, 50%)',
            'sda-brand-hover': 'hsl(24, 100%, 45%)',
            'sda-border': 'hsl(217, 33%, 25%)',
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: theme('colors.sda-bg'); color: #f8fafc; }
   .glass-card {
      background: theme('colors.sda-surface');
      border: 1px solid theme('colors.sda-border');
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
   .glass-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); }
    #progress-bar { transition: transform 0.1s linear; transform-origin: left; }
  </style>
</head>
<body class="min-h-screen p-6 md:p-10 antialiased">
  <div class="max-w-6xl mx-auto">
    
    <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 glass-card p-6 rounded-2xl gap-6">
      <div>
        <h1 class="text-2xl font-bold tracking-tight">Performance LP <span class="text-sda-brand">SDA Ao Vivo</span></h1>
        <p class="text-sm text-slate-400 mt-1">Análise de tráfego e conversão em tempo real</p>
      </div>
      <div class="flex items-center gap-5 w-full md:w-auto">
        <div class="text-right flex-1 md:flex-none">
          <p class="text-xs font-medium text-slate-400 uppercase tracking-wider">Próximo refresh</p>
          <p id="countdown-text" class="text-xl font-mono font-semibold text-white">30:00</p>
        </div>
        <button onclick="enviarEmail()" id="btn-email" class="bg-sda-brand hover:bg-sda-brand-hover text-white px-5 py-2.5 rounded-lg font-semibold transition-colors flex items-center gap-2 shadow-lg shadow-orange-900/20 whitespace-nowrap">
          <span id="btn-email-text">📧 Enviar Relatório</span>
        </button>
      </div>
    </header>

    <div class="w-full bg-sda-surface rounded-full h-1 mb-8 overflow-hidden border border-sda-border">
      <div id="progress-bar" class="bg-sda-brand h-1 rounded-full w-full"></div>
    </div>

    <div id="status-message" class="hidden p-4 rounded-xl mb-6 text-center font-medium shadow-md"></div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
      <div class="glass-card p-6 rounded-2xl">
        <h3 class="text-slate-400 text-sm font-semibold mb-2 uppercase tracking-wider">Sessões Totais</h3>
        <p class="text-4xl font-bold" id="metric-sessoes">--</p>
      </div>
      <div class="glass-card p-6 rounded-2xl">
        <h3 class="text-slate-400 text-sm font-semibold mb-2 uppercase tracking-wider">Leads da Página</h3>
        <p class="text-4xl font-bold" id="metric-leads">--</p>
      </div>
      <div class="glass-card p-6 rounded-2xl border-t-4 border-t-sda-brand">
        <h3 class="text-slate-400 text-sm font-semibold mb-2 uppercase tracking-wider">Taxa de Conversão</h3>
        <p class="text-4xl font-bold text-sda-brand" id="metric-conversao">--</p>
      </div>
    </div>

    <div class="glass-card p-6 rounded-2xl">
      <h3 class="text-slate-200 text-sm font-semibold mb-4 border-b border-sda-border pb-2">Log de Dados Brutos</h3>
      <pre id="json-container" class="text-xs text-slate-400 overflow-x-auto whitespace-pre-wrap font-mono">Aguardando sincronização com o Google Apps Script...</pre>
    </div>
  </div>

  <script>
    // IMPORTANTE: Cole abaixo a URL PÚBLICA do seu Google Apps Script (Terminada em /exec)
    const API_URL = "SUA_URL_DO_WEB_APP_AQUI_TERMINADA_EM_/EXEC";

    // 1. Lógica Absoluta de Contagem e Refresh (Evita throttling em abas inativas)
    const REFRESH_INTERVAL_MS = 30 * 60 * 1000; // 30 minutos
    let targetTime = Date.now() + REFRESH_INTERVAL_MS;

    function updateTimer() {
      const now = Date.now();
      const remainingMs = Math.max(0, targetTime - now);

      const minutes = Math.floor(remainingMs / 60000);
      const seconds = Math.floor((remainingMs % 60000) / 1000);
      document.getElementById('countdown-text').textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

      // Usa transform scaleX para alto desempenho (GPU) sem acionar repaint na renderização
      const progressPercentage = remainingMs / REFRESH_INTERVAL_MS;
      document.getElementById('progress-bar').style.transform = `scaleX(${progressPercentage})`;

      if (remainingMs === 0) {
        targetTime = Date.now() + REFRESH_INTERVAL_MS;
        carregarDados(); // Carrega os dados silenciosamente via fetch sem dar F5 na página [5]
      }
      requestAnimationFrame(updateTimer);
    }
    requestAnimationFrame(updateTimer);

    // 2. Fetch dos dados do Google Sheets
    async function carregarDados() {
      if(API_URL.includes("SUA_URL_DO_WEB_APP_AQUI")) return; // Ignora se a URL não foi inserida
      try {
        const response = await fetch(API_URL);
        const data = await response.json();
        
        // Exemplo: populando as métricas caso seu JSON tenha esses atributos.
        // Se o JSON gerado pelo seu script tiver propriedades diferentes, ajuste os nomes abaixo.
        document.getElementById('metric-sessoes').textContent = data.sessoes |

| "0";
        document.getElementById('metric-leads').textContent = data.leads_totais |

| "0";
        document.getElementById('metric-conversao').textContent = data.taxa_conversao |

| "0%";
        
        document.getElementById('json-container').textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        console.error("Erro ao puxar dados:", error);
        document.getElementById('json-container').textContent = "Falha na conexão com o banco de dados.";
      }
    }
    carregarDados(); // Início imediato

    // 3. Função de Disparo de E-mail Bypassing CORS
    async function enviarEmail() {
      const btn = document.getElementById('btn-email');
      const btnText = document.getElementById('btn-email-text');
      const statusBox = document.getElementById('status-message');
      
      if(API_URL.includes("SUA_URL_DO_WEB_APP_AQUI")) {
          alert("Por favor, configure sua API_URL no código fonte primeiro.");
          return;
      }

      const emailDestino = prompt("Digite o e-mail de destino do relatório:");
      if (!emailDestino) return;

      btn.disabled = true;
      btn.classList.add('opacity-50', 'cursor-not-allowed');
      btnText.textContent = "⏳ Processando...";
      statusBox.className = "hidden";

      try {
        const payload = {
          action: "email",
          to: emailDestino,
          conversao: document.getElementById('metric-conversao').textContent
        };

        // O SEGREDO DO CORS: redirect 'follow' obriga o front a seguir o redirecionamento 302
        // O Content-Type 'text/plain' engana o preflight OPTIONS para requisições simples
        const response = await fetch(API_URL, {
          method: "POST",
          redirect: "follow", 
          headers: {
            "Content-Type": "text/plain;charset=utf-8", 
          },
          body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (result.status === "success") {
          statusBox.textContent = "✅ " + result.message;
          statusBox.className = "p-4 rounded-xl mb-6 text-center font-medium bg-green-950 text-green-400 border border-green-800 block";
        } else {
          throw new Error(result.message);
        }

      } catch (error) {
        console.error("Falha na negociação de tráfego:", error);
        statusBox.textContent = "⚠️ Erro ao enviar relatório. Possível falha na rede.";
        statusBox.className = "p-4 rounded-xl mb-6 text-center font-medium bg-red-950 text-red-400 border border-red-800 block";
      } finally {
        btn.disabled = false;
        btn.classList.remove('opacity-50', 'cursor-not-allowed');
        btnText.textContent = "📧 Enviar Relatório";
      }
    }
  </script>
</body>
</html>
